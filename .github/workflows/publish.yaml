name: Build & Publish Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to build (e.g. 1.2.3). Defaults to the highest semver tag."
        required: false
  release:
    types: ["published"]

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  build-and-push-image:
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository using git
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine TAG_TO_BUILD
        id: select_tag
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "TAG_TO_BUILD=${{ github.event.release.tag_name }}" >> $GITHUB_ENV
            echo "APPLY_LATEST=true" >> $GITHUB_ENV
          elif [[ -n "${{ github.event.inputs.tag }}" ]]; then
            echo "TAG_TO_BUILD=${{ github.event.inputs.tag }}" >> $GITHUB_ENV
            echo "APPLY_LATEST=false" >> $GITHUB_ENV
          else
            LATEST=$(git tag --list --sort='-v:refname' | head -n1)
            echo "TAG_TO_BUILD=$LATEST" >> $GITHUB_ENV
            echo "APPLY_LATEST=true" >> $GITHUB_ENV
          fi
          echo "Selected tag: $TAG_TO_BUILD"

      - name: Checkout code at TAG_TO_BUILD
        run: git checkout "$TAG_TO_BUILD"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PAT }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
            ${{ github.repository }}
          tags: |
            type=raw,value=${{ env.TAG_TO_BUILD }}
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ env.APPLY_LATEST == 'true' }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
